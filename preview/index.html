<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #667eea;
            margin-bottom: 20px;
        }
        .success {
            color: #52c41a;
            font-size: 1.2em;
            margin: 20px 0;
        }
        .links {
            margin-top: 30px;
        }
        .links a {
            display: block;
            margin: 10px 0;
            padding: 10px;
            background: #f0f0f0;
            text-decoration: none;
            color: #333;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .links a:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ 服务器运行正常</h1>
        <div class="success">预览服务器已成功启动！</div>
        <p>当前时间: <span id="time"></span></p>
        
        <div class="links">
            <a href="home.html">首页</a>
            <a href="dashboard.html">工作台</a>
            <a href="login.html">登录</a>
            <a href="register.html">注册</a>
            <a href="config.html">配置</a>
            <a href="test.html">测试</a>
            <a href="fanqie_config.html">番茄小说配置</a>
        </div>
    </div>
    
    <script>
        document.getElementById('time').textContent = new Date().toLocaleString('zh-CN');
    </script>
</body>
</html>
